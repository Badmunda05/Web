<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>BAD MUSIC</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
    body{
      background:#0a0a12;
      color:#fff;
      display:flex;flex-direction:column;
      height:100dvh;
      position:relative;
    }

    /* ── Animated BG ────────────────────────────────── */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
    .bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22;animation:orb 12s ease-in-out infinite}
    .bg-orb1{width:400px;height:400px;background:#6ea5ff;top:-120px;left:-100px;animation-delay:0s}
    .bg-orb2{width:320px;height:320px;background:#a66bff;bottom:-80px;right:-80px;animation-delay:4s}
    .bg-orb3{width:260px;height:260px;background:#ff6ea5;top:45%;left:55%;animation-delay:8s}
    @keyframes orb{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-35px) scale(1.1)}}

    /* ── Layout ─────────────────────────────────────── */
    #app{position:relative;z-index:5;display:flex;flex-direction:column;height:100dvh}

    /* ── Header ─────────────────────────────────────── */
    .header{
      flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;
      background:rgba(0,0,0,0.45);backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .logo{font-size:17px;font-weight:800;
      background:linear-gradient(90deg,#6ea5ff,#a66bff,#ff6ea5);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .listener-badge{
      font-size:12px;color:#ccc;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.1);
      padding:4px 10px;border-radius:20px;
    }

    /* ── Tabs ───────────────────────────────────────── */
    .tabs{
      flex-shrink:0;display:flex;
      background:rgba(0,0,0,0.3);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .tab{
      flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;
      color:#777;cursor:pointer;transition:color .2s;border:none;background:none;
      position:relative;
    }
    .tab.active{color:#fff}
    .tab.active::after{
      content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;
      background:linear-gradient(90deg,#6ea5ff,#ff6ea5);border-radius:2px;
    }

    /* ── Pages ──────────────────────────────────────── */
    .page{display:none;flex:1;overflow-y:auto;padding:16px 14px 16px}
    .page.active{display:flex;flex-direction:column}
    .page::-webkit-scrollbar{width:3px}
    .page::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

    /* ═══════════════════════════════════════════════════
       PLAYER PAGE
    ═══════════════════════════════════════════════════ */

    /* Album art */
    .album-wrap{
      margin:8px auto 0;width:200px;height:200px;
      position:relative;display:flex;align-items:center;justify-content:center;
    }
    .album-ring{
      position:absolute;inset:0;border-radius:50%;padding:6px;
      background:conic-gradient(#6ea5ff 0deg,#a66bff 0deg,#ff6ea5 0deg,#1a1a2e 0deg 360deg);
      transition:background .15s linear;
    }
    .album-inner{
      width:170px;height:170px;border-radius:50%;
      background:linear-gradient(135deg,#1e1e3a,#2a1a3a);
      border:5px solid #0a0a12;
      display:flex;align-items:center;justify-content:center;
      font-size:52px;z-index:2;position:relative;
      overflow:hidden;transition:transform .3s;
    }
    .album-inner.spinning{animation:spin 8s linear infinite}
    .album-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* EQ bars */
    .eq{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:20px;margin:8px 0 2px}
    .eq span{display:block;width:3px;border-radius:2px;background:linear-gradient(to top,#6ea5ff,#ff6ea5)}
    .eq.playing span{animation:eq-bar .7s ease-in-out infinite alternate}
    .eq span:nth-child(1){height:7px;animation-delay:0s}
    .eq span:nth-child(2){height:15px;animation-delay:.1s}
    .eq span:nth-child(3){height:10px;animation-delay:.2s}
    .eq span:nth-child(4){height:18px;animation-delay:.3s}
    .eq span:nth-child(5){height:12px;animation-delay:.4s}
    @keyframes eq-bar{from{transform:scaleY(.3)}to{transform:scaleY(1)}}

    /* Track info */
    .track-info{text-align:center;width:100%}
    .track-title{
      font-size:16px;font-weight:700;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:290px;margin:0 auto;
    }
    .track-sub{font-size:12px;color:#aaa;margin-top:3px}

    /* Listener avatars */
    .live-avatars{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin:8px 0}
    .live-avatars img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #222}
    .live-avatars .av-name{
      font-size:10px;background:rgba(255,255,255,0.08);
      border-radius:12px;padding:3px 8px;
    }

    /* Progress */
    .progress-row{display:flex;align-items:center;gap:8px;width:100%;margin:6px 0}
    .time-tag{font-size:11px;color:#aaa;min-width:34px}
    .time-tag.r{text-align:right}
    input[type=range]{
      flex:1;-webkit-appearance:none;height:5px;border-radius:5px;outline:none;cursor:pointer;
      background:linear-gradient(90deg,#6ea5ff 0%,#a66bff 50%,#ff6ea5 100%);
    }
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
      background:#fff;border:2px solid #a66bff;cursor:pointer;
    }

    /* Controls */
    .controls{display:flex;align-items:center;justify-content:center;gap:18px;margin:8px 0}
    .ctrl{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:6px}
    .play-btn{
      width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;
      background:linear-gradient(135deg,#6ea5ff,#a66bff,#ff6ea5);
      color:#fff;font-size:22px;
      box-shadow:0 6px 20px rgba(110,165,255,.4);
      transition:transform .1s;display:flex;align-items:center;justify-content:center;
    }
    .play-btn:active{transform:scale(.93)}
    .fav-btn{font-size:22px;background:none;border:none;cursor:pointer;color:#ff6ea5;padding:6px}
    .stop-btn{
      font-size:12px;background:rgba(255,75,43,.15);border:1px solid rgba(255,75,43,.3);
      color:#ff6b6b;padding:6px 16px;border-radius:20px;cursor:pointer;margin-top:2px;
    }

    /* Volume */
    .vol-row{display:flex;align-items:center;gap:8px;width:100%;margin:4px 0}
    .vol-icon{font-size:14px;color:#aaa}
    .vol-row span{font-size:11px;color:#aaa;min-width:32px;text-align:right}

    /* User strip */
    .user-strip{
      margin-top:10px;background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);border-radius:14px;
      padding:10px 14px;display:flex;align-items:center;gap:10px;
    }
    .user-strip img,.user-strip .av-ph{
      width:40px;height:40px;border-radius:50%;object-fit:cover;
      border:2px solid #6ea5ff;flex-shrink:0;
    }
    .user-strip .av-ph{
      background:linear-gradient(135deg,#6ea5ff,#ff6ea5);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:700;
    }
    .user-strip .u-name{font-weight:700;font-size:14px}
    .user-strip .u-handle{font-size:11px;color:#aaa}

    /* ═══════════════════════════════════════════════════
       CHAT PAGE
    ═══════════════════════════════════════════════════ */
    #chatPage{padding:0;display:flex;flex-direction:column}
    .chat-messages{
      flex:1;overflow-y:auto;padding:12px 12px 8px;
      display:flex;flex-direction:column;gap:8px;
    }
    .chat-messages::-webkit-scrollbar{width:3px}
    .chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08)}

    .chat-msg{display:flex;gap:8px;align-items:flex-end;max-width:85%}
    .chat-msg.me{flex-direction:row-reverse;align-self:flex-end}
    .chat-msg.other{align-self:flex-start}
    .chat-av{
      width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;
      border:1px solid rgba(255,255,255,0.1);
    }
    .chat-av-ph{
      width:30px;height:30px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,#6ea5ff,#ff6ea5);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;
    }
    .bubble-wrap{display:flex;flex-direction:column;gap:2px}
    .bubble-name{font-size:10px;color:#aaa;margin-left:4px}
    .me .bubble-name{text-align:right;margin-right:4px}
    .bubble{
      padding:8px 12px;border-radius:16px;font-size:13px;line-height:1.4;
      max-width:240px;word-break:break-word;
    }
    .other .bubble{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.07);border-bottom-left-radius:4px}
    .me .bubble{background:linear-gradient(135deg,#6ea5ff,#a66bff);border-bottom-right-radius:4px}
    .bubble-ts{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}
    .me .bubble-ts{text-align:right;margin-right:4px}
    .sys-line{text-align:center;font-size:11px;color:#555;padding:2px 0}

    .chat-input-row{
      flex-shrink:0;display:flex;align-items:center;gap:8px;
      padding:8px 12px 12px;
      background:rgba(0,0,0,.4);backdrop-filter:blur(12px);
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .emoji-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:#aaa}
    .chat-in{
      flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,.1);
      border-radius:22px;padding:9px 14px;color:#fff;font-size:13px;
      outline:none;resize:none;max-height:80px;overflow-y:auto;font-family:inherit;
    }
    .chat-in::placeholder{color:#555}
    .chat-send{
      width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
      background:linear-gradient(135deg,#6ea5ff,#a66bff);
      color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(110,165,255,.3);flex-shrink:0;
    }
    .emoji-tray{
      display:none;flex-wrap:wrap;gap:5px;padding:8px 12px;
      background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.05);
    }
    .emoji-tray.show{display:flex}
    .emoji-tray span{font-size:20px;cursor:pointer;transition:transform .15s}
    .emoji-tray span:hover{transform:scale(1.3)}

    /* ═══════════════════════════════════════════════════
       PROFILE PAGE
    ═══════════════════════════════════════════════════ */
    .profile-hero{
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,.08);
      border-radius:20px;padding:20px 16px;
      display:flex;align-items:center;gap:14px;margin-bottom:14px;
    }
    .hero-av{position:relative;flex-shrink:0}
    .hero-av img,.hero-av .av-ph2{
      width:70px;height:70px;border-radius:50%;object-fit:cover;
      border:3px solid #6ea5ff;
      box-shadow:0 0 20px rgba(110,165,255,.3);
    }
    .hero-av .av-ph2{
      background:linear-gradient(135deg,#6ea5ff,#ff6ea5);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:700;
    }
    .online-dot{
      position:absolute;bottom:3px;right:3px;
      width:12px;height:12px;border-radius:50%;
      background:#4ade80;border:2px solid #0a0a12;
    }
    .hero-info h2{
      font-size:18px;font-weight:800;
      background:linear-gradient(90deg,#6ea5ff,#ff6ea5);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .hero-info .h-handle{font-size:12px;color:#aaa;margin-top:3px}
    .hero-info .h-id{font-size:11px;color:#555;margin-top:4px}

    .stat-row{display:flex;gap:10px;margin-bottom:14px}
    .stat-card{
      flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,.07);
      border-radius:14px;padding:12px 8px;text-align:center;
    }
    .stat-num{
      font-size:22px;font-weight:800;
      background:linear-gradient(90deg,#6ea5ff,#ff6ea5);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .stat-lbl{font-size:11px;color:#aaa;margin-top:2px}

    .section-hd{
      font-size:13px;font-weight:700;
      background:linear-gradient(90deg,#6ea5ff,#a66bff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:8px;
    }
    .hist-list{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.06);
      border-radius:14px;overflow:hidden;
    }
    .hist-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);
    }
    .hist-item:last-child{border-bottom:none}
    .hist-thumb{
      width:42px;height:42px;border-radius:8px;object-fit:cover;
      background:linear-gradient(135deg,#1e1e3a,#2a1a3a);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;
    }
    .hist-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
    .hist-title{font-size:13px;font-weight:600}
    .hist-sub{font-size:11px;color:#aaa;margin-top:2px}
    .empty-state{text-align:center;color:#444;font-size:13px;padding:20px}

    /* ── Bottom nav ─────────────────────────────────── */
    .bottom-nav{display:none} /* tabs handle navigation */
  </style>
</head>
<body>
<div class="bg">
  <div class="bg-orb bg-orb1"></div>
  <div class="bg-orb bg-orb2"></div>
  <div class="bg-orb bg-orb3"></div>
</div>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">🎵 BAD MUSIC</div>
    <div class="listener-badge">👂 <span id="listenerCount">0</span></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('player',this)">▶ Player</button>
    <button class="tab" onclick="switchTab('chat',this)">💬 Chat</button>
    <button class="tab" onclick="switchTab('profile',this)">👤 Profile</button>
  </div>

  <!-- ═══ PLAYER PAGE ═══════════════════════════════════════ -->
  <div class="page active" id="playerPage">

    <!-- Join screen (shown before joining) -->
    <div id="joinScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px">
      <div style="width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#6ea5ff,#a66bff,#ff6ea5);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 40px rgba(110,165,255,.4);animation:orb 4s ease-in-out infinite">🎵</div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:800;background:linear-gradient(90deg,#6ea5ff,#ff6ea5);-webkit-background-clip:text;-webkit-text-fill-color:transparent">BAD MUSIC</div>
        <div style="font-size:13px;color:#aaa;margin-top:4px">Real-time Music Room</div>
      </div>
      <!-- User preview -->
      <div id="joinUserCard" style="display:none;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:12px 18px;display:flex;align-items:center;gap:12px">
        <img id="joinAvatar" src="" style="width:44px;height:44px;border-radius:50%;border:2px solid #6ea5ff">
        <div>
          <div id="joinName" style="font-weight:700;font-size:14px"></div>
          <div id="joinHandle" style="font-size:12px;color:#aaa"></div>
        </div>
      </div>
      <button onclick="joinRoom()" style="padding:14px 40px;border:none;border-radius:20px;background:linear-gradient(135deg,#6ea5ff,#a66bff,#ff6ea5);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 25px rgba(110,165,255,.4)">
        🎧 Join Music Room
      </button>
      <div style="font-size:11px;color:#444">Play • Chat • Vibe Together</div>
    </div>

    <!-- Player (hidden until join) -->
    <div id="playerMain" style="display:none;flex-direction:column;align-items:center;width:100%;flex:1">

      <!-- Album Art -->
      <div class="album-wrap">
        <div class="album-ring" id="albumRing"></div>
        <div class="album-inner" id="albumInner">🎵</div>
      </div>

      <div class="eq" id="eqBars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="track-info">
        <div class="track-title" id="songTitle">No Song Playing</div>
        <div class="track-sub" id="songSub">Waiting for music...</div>
      </div>

      <!-- Live listeners avatars -->
      <div class="live-avatars" id="liveAvatars"></div>

      <!-- Progress -->
      <div class="progress-row">
        <span class="time-tag" id="curTime">0:00</span>
        <input type="range" id="progressBar" min="0" value="0" step="0.1"/>
        <span class="time-tag r" id="totalTime">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl" id="prevBtn"><i class="fas fa-backward-step"></i></button>
        <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
        <button class="ctrl" id="nextBtn"><i class="fas fa-forward-step"></i></button>
        <button class="fav-btn" id="favBtn">♡</button>
      </div>

      <!-- Volume -->
      <div class="vol-row">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volBar" min="0" max="1" step="0.05" value="0.8"/>
        <span id="volPct">80%</span>
      </div>

      <button class="stop-btn" id="stopBtn">⏹ End Session</button>

      <!-- User strip -->
      <div class="user-strip" id="userStrip">
        <div class="av-ph" id="stripAv">G</div>
        <div>
          <div class="u-name" id="stripName">Guest</div>
          <div class="u-handle" id="stripHandle">@guest</div>
        </div>
      </div>
    </div>
  </div><!-- end playerPage -->

  <!-- ═══ CHAT PAGE ════════════════════════════════════════ -->
  <div class="page" id="chatPage">
    <div class="chat-messages" id="chatMessages">
      <div class="sys-line">🎵 Welcome to BAD MUSIC chat!</div>
    </div>
    <div class="emoji-tray" id="emojiTray">
      <span>🎵</span><span>🎧</span><span>🔥</span><span>❤️</span>
      <span>😂</span><span>👍</span><span>😍</span><span>🎶</span>
      <span>💯</span><span>😭</span><span>🥳</span><span>💃</span>
    </div>
    <div class="chat-input-row">
      <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
      <textarea class="chat-in" id="chatInput" rows="1" placeholder="Message..."
        onkeydown="chatKey(event)" oninput="autoResize(this)"></textarea>
      <button class="chat-send" onclick="sendChat()">➤</button>
    </div>
  </div>

  <!-- ═══ PROFILE PAGE ════════════════════════════════════ -->
  <div class="page" id="profilePage">
    <div class="profile-hero">
      <div class="hero-av">
        <div class="av-ph2" id="heroAv">G</div>
        <div class="online-dot"></div>
      </div>
      <div class="hero-info">
        <h2 id="heroName">Guest</h2>
        <div class="h-handle" id="heroHandle">@guest</div>
        <div class="h-id" id="heroId">ID: —</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num" id="statPlays">0</div>
        <div class="stat-lbl">▶ Songs Played</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statListeners">0</div>
        <div class="stat-lbl">👂 In Room</div>
      </div>
    </div>
    <div class="section-hd">⏱ Play History</div>
    <div class="hist-list" id="histList">
      <div class="empty-state">No history yet — play some music! 🎧</div>
    </div>
  </div>
</div><!-- end app -->

<audio id="audioEl" preload="auto"></audio>

<script>
/* ═══════════════════════════════════════════════════════════
   TELEGRAM INIT
═══════════════════════════════════════════════════════════ */
const tg   = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

const TG_USER = tg?.initDataUnsafe?.user;
const ME = {
  uid:      String(TG_USER?.id || 'guest_' + Math.floor(Math.random()*9999)),
  name:     ((TG_USER?.first_name||'Guest') + (TG_USER?.last_name ? ' '+TG_USER.last_name : '')).trim(),
  username: TG_USER?.username || '',
  photo:    TG_USER?.photo_url || '',
};

/* Populate join card */
if(TG_USER){
  document.getElementById('joinUserCard').style.display='flex';
  const ja=document.getElementById('joinAvatar');
  ja.src=ME.photo||'https://via.placeholder.com/44';
  ja.onerror=()=>ja.style.display='none';
  document.getElementById('joinName').textContent=ME.name;
  document.getElementById('joinHandle').textContent='@'+(ME.username||ME.uid);
}

/* Profile page */
function setProfileUI(){
  const av=document.getElementById('heroAv');
  if(ME.photo){
    av.outerHTML=`<img class="av-ph2" id="heroAv" src="${ME.photo}"
      onerror="this.outerHTML='<div class=av-ph2 id=heroAv>${ME.name[0]}</div>'">`;
  } else {
    av.textContent=ME.name[0]||'G';
  }
  document.getElementById('heroName').textContent=ME.name;
  document.getElementById('heroHandle').textContent='@'+(ME.username||ME.uid);
  document.getElementById('heroId').textContent='ID: '+ME.uid;
  // Strip
  const sa=document.getElementById('stripAv');
  if(ME.photo){
    const img=document.createElement('img');
    img.src=ME.photo;img.style.cssText='width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #6ea5ff;flex-shrink:0';
    img.onerror=()=>{ sa.textContent=ME.name[0]; };
    sa.replaceWith(img);
  } else { sa.textContent=ME.name[0]||'G'; }
  document.getElementById('stripName').textContent=ME.name;
  document.getElementById('stripHandle').textContent='@'+(ME.username||ME.uid);
}
setProfileUI();

/* ═══════════════════════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════════════════════ */
let socket, isDragging=false, joined=false;
const audio = document.getElementById('audioEl');

function connectWS(){
  const proto = location.protocol==='https:'?'wss:':'ws:';
  socket = new WebSocket(`${proto}//${location.host}/ws/${ME.uid}`);

  socket.onmessage = e => {
    const data = JSON.parse(e.data);
    if(data.type==='state_update') handleState(data);
    else if(data.type==='chat_message') appendChat(data);
  };

  socket.onopen = () => {
    // Identify
    socket.send(JSON.stringify({
      type:'join', name:ME.name, photo:ME.photo, username:ME.username
    }));
  };

  socket.onclose = () => setTimeout(connectWS, 2000);
}

/* ── State handler ─────────────────────────────────────── */
function handleState(data){
  /* listeners */
  const listeners = data.listeners||[];
  document.getElementById('listenerCount').textContent = data.listeners_count||listeners.length;
  document.getElementById('statListeners').textContent = data.listeners_count||listeners.length;

  /* avatars row */
  const row = document.getElementById('liveAvatars');
  row.innerHTML = listeners.slice(0,8).map(l=>{
    if(l.photo) return `<img src="${esc(l.photo)}" title="${esc(l.name)}" onerror="this.style.display='none'">`;
    return `<span class="av-name">${esc(l.name)}</span>`;
  }).join('');

  /* song */
  if(data.current_song){
    const song = data.current_song;
    if(audio.src !== location.origin + song.url){
      audio.src = song.url;
      document.getElementById('songTitle').textContent = song.title||'Now Playing';
      document.getElementById('songSub').textContent   = '▶ Streaming live';
    }
    if(data.is_playing){
      audio.play().catch(()=>{});
      document.getElementById('playBtn').innerHTML='<i class="fas fa-pause"></i>';
      document.getElementById('albumInner').classList.add('spinning');
      document.getElementById('eqBars').classList.add('playing');
    } else {
      audio.pause();
      document.getElementById('playBtn').innerHTML='<i class="fas fa-play"></i>';
      document.getElementById('albumInner').classList.remove('spinning');
      document.getElementById('eqBars').classList.remove('playing');
    }
    if(Math.abs(audio.currentTime - (data.seek_time||0)) > 2 && !isDragging)
      audio.currentTime = data.seek_time||0;
  } else {
    document.getElementById('songTitle').textContent = 'No Song Playing';
    document.getElementById('songSub').textContent   = 'Waiting for music...';
    document.getElementById('albumInner').classList.remove('spinning');
    document.getElementById('eqBars').classList.remove('playing');
    document.getElementById('playBtn').innerHTML='<i class="fas fa-play"></i>';
  }
  // history in chat state
  if(data.chat_history) data.chat_history.forEach(m=>appendChat(m,false));
}

/* ── Audio progress ────────────────────────────────────── */
audio.ontimeupdate = () => {
  if(!isDragging && audio.duration){
    document.getElementById('progressBar').value = audio.currentTime;
    document.getElementById('curTime').textContent = fmt(audio.currentTime);
    // ring
    const deg = (audio.currentTime/audio.duration)*360;
    document.getElementById('albumRing').style.background=
      `conic-gradient(#6ea5ff 0deg ${deg/3}deg,#a66bff ${deg/3}deg ${deg*2/3}deg,#ff6ea5 ${deg*2/3}deg ${deg}deg,#1a1a2e ${deg}deg 360deg)`;
  }
};
audio.onloadedmetadata = () => {
  document.getElementById('progressBar').max=audio.duration;
  document.getElementById('totalTime').textContent=fmt(audio.duration);
};

/* Play log */
audio.addEventListener('play', () => {
  if(!room_song) return;
  logPlay(room_song);
});
let room_song = null;

/* ── Controls ──────────────────────────────────────────── */
document.getElementById('playBtn').onclick=()=>{
  if(!socket||socket.readyState!==1) return;
  socket.send(JSON.stringify({type:audio.paused?'play':'pause',seek_time:audio.currentTime}));
};
document.getElementById('prevBtn').onclick=()=>
  socket?.send(JSON.stringify({type:'skip'}));
document.getElementById('nextBtn').onclick=()=>
  socket?.send(JSON.stringify({type:'skip'}));
document.getElementById('stopBtn').onclick=()=>
  socket?.send(JSON.stringify({type:'stop'}));

const pb = document.getElementById('progressBar');
pb.oninput=()=>{isDragging=true;document.getElementById('curTime').textContent=fmt(pb.value)};
pb.onchange=()=>{
  isDragging=false;audio.currentTime=pb.value;
  socket?.send(JSON.stringify({type:'seek',seek_time:audio.currentTime}));
};

const vb=document.getElementById('volBar');
vb.oninput=()=>{
  audio.volume=vb.value;
  document.getElementById('volPct').textContent=Math.round(vb.value*100)+'%';
};

/* Fav */
let isFav=false;
document.getElementById('favBtn').onclick=()=>{
  isFav=!isFav;
  document.getElementById('favBtn').textContent=isFav?'❤️':'♡';
};

/* ── Join ──────────────────────────────────────────────── */
function joinRoom(){
  document.getElementById('joinScreen').style.display='none';
  document.getElementById('playerMain').style.display='flex';
  joined=true;
  // Check URL for auto-play link
  const urlP=new URLSearchParams(location.search);
  const playLink=urlP.get('play');
  if(playLink) triggerPlay(playLink);
  connectWS();
}

async function triggerPlay(link){
  try{
    await fetch(`/play_song?link=${encodeURIComponent(link)}`,{method:'POST'});
  }catch(e){}
}

/* ── Play history log ──────────────────────────────────── */
const localHistory = JSON.parse(localStorage.getItem('badmusic_history')||'[]');
renderHistory();

function logPlay(song){
  localHistory.unshift({title:song.title||'Unknown',ts:Date.now()});
  if(localHistory.length>30) localHistory.pop();
  localStorage.setItem('badmusic_history',JSON.stringify(localHistory));
  document.getElementById('statPlays').textContent=localHistory.length;
  renderHistory();
  fetch('/api/play_log',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({uid:ME.uid,song})
  }).catch(()=>{});
}

function renderHistory(){
  const el=document.getElementById('histList');
  document.getElementById('statPlays').textContent=localHistory.length;
  if(!localHistory.length){
    el.innerHTML='<div class="empty-state">No history yet — play some music! 🎧</div>';
    return;
  }
  el.innerHTML=localHistory.slice(0,20).map(s=>`
    <div class="hist-item">
      <div class="hist-thumb">🎵</div>
      <div>
        <div class="hist-title">${esc(s.title)}</div>
        <div class="hist-sub">${new Date(s.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════════════════ */
const chatMsgs=document.getElementById('chatMessages');
const chatInput=document.getElementById('chatInput');
let chatLoaded=false;

function loadChatHistory(){
  if(chatLoaded) return;
  chatLoaded=true;
  fetch('/api/chat').then(r=>r.json()).then(d=>{
    (d.messages||[]).forEach(m=>appendChat(m,false));
    chatMsgs.scrollTop=chatMsgs.scrollHeight;
  }).catch(()=>{});
}

function appendChat(msg,animate=true){
  const mine=String(msg.uid)===ME.uid;
  const ts=msg.ts?new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  const init=(msg.name||'G')[0].toUpperCase();
  const av=msg.photo
    ?`<img class="chat-av" src="${esc(msg.photo)}" onerror="this.outerHTML='<div class=chat-av-ph>${init}</div>'">`
    :`<div class="chat-av-ph">${init}</div>`;
  const wrap=document.createElement('div');
  wrap.className=`chat-msg ${mine?'me':'other'}`;
  wrap.innerHTML=`${av}<div class="bubble-wrap">
    ${!mine?`<div class="bubble-name">${esc(msg.name)}</div>`:''}
    <div class="bubble">${esc(msg.text)}</div>
    <div class="bubble-ts">${ts}</div>
  </div>`;
  chatMsgs.appendChild(wrap);
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
}

function sendChat(){
  const text=chatInput.value.trim();
  if(!text) return;
  chatInput.value='';autoResize(chatInput);
  if(socket?.readyState===1){
    socket.send(JSON.stringify({
      type:'chat_message',text,
      name:ME.name,photo:ME.photo,uid:ME.uid
    }));
  } else {
    // fallback REST
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({uid:ME.uid,name:ME.name,photo:ME.photo,text})}).catch(()=>{});
    appendChat({uid:ME.uid,name:ME.name,photo:ME.photo,text,ts:Date.now()});
  }
}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px'}

/* Emoji */
document.getElementById('emojiTray').querySelectorAll('span').forEach(s=>{
  s.onclick=()=>{chatInput.value+=s.textContent;chatInput.focus();toggleEmoji()};
});
function toggleEmoji(){document.getElementById('emojiTray').classList.toggle('show')}
document.addEventListener('click',e=>{
  if(!e.target.closest('.emoji-btn')&&!e.target.closest('#emojiTray'))
    document.getElementById('emojiTray').classList.remove('show');
});

/* ═══════════════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════════════ */
function switchTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name+'Page').classList.add('active');
  btn.classList.add('active');
  if(name==='chat') loadChatHistory();
}

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
function fmt(s){
  if(isNaN(s)||s===Infinity) return '0:00';
  const m=Math.floor(s/60),sc=Math.floor(s%60);
  return m+':'+(sc<10?'0':'')+sc;
}
function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

/* Auto-join if ?play= param is present (deep link from bot) */
const _urlP=new URLSearchParams(location.search);
if(_urlP.get('play')||_urlP.get('autoplay')){
  joinRoom();
}
</script>
